<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Viewer - Xem NFT trên BASE Mainnet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">NFT Viewer</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <form id="walletForm" class="mb-4">
                            <div class="mb-3">
                                <label for="walletAddress" class="form-label">Nhập địa chỉ ví Ethereum:</label>
                                <input type="text" class="form-control" id="walletAddress" 
                                       placeholder="0x..." required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Xem NFT</button>
                        </form>
                    </div>
                </div>

                <div id="loading" class="text-center mt-4 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Đang tải...</span>
                    </div>
                    <p class="mt-2">Đang tải danh sách NFT...</p>
                </div>

                <div id="error" class="alert alert-danger mt-4 d-none"></div>

                <div id="nftGrid" class="row mt-4">
                    <!-- NFTs sẽ được hiển thị ở đây -->
                </div>
            </div>
        </div>
    </div>

    <!-- Template cho NFT card -->
    <template id="nftTemplate">
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100">
                <img src="" class="card-img-top nft-image" alt="NFT Image">
                <div class="card-body">
                    <h5 class="card-title">Token ID: <span class="token-id"></span></h5>
                    <h6 class="card-subtitle mb-2 text-muted nft-name"></h6>
                    <p class="card-text description"></p>
                    <div class="attributes small">
                        <!-- Attributes sẽ được hiển thị ở đây -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
